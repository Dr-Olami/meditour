name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Lint
        run: npm run lint
        working-directory: frontend

      - name: Format check
        run: npm run format:check
        working-directory: frontend

      - name: Unit tests
        run: npm test
        working-directory: frontend

      - name: Build
        run: npm run build
        working-directory: frontend

      - name: Accessibility audit (axe)
        working-directory: frontend
        run: |
          npx http-server dist -p 8080 --silent &
          sleep 3
          npx axe http://localhost:8080 http://localhost:8080/doctors \
            --exit \
            --disable color-contrast \
            --tags wcag2a,wcag2aa,wcag21a,wcag21aa

      - name: Lighthouse CI
        working-directory: frontend
        run: npx lhci autorun --config=.lighthouserc.cjs
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}
